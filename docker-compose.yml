services:
  postgres:
    image: postgres:16-alpine
    container_name: engip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: engip-site
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d engip-site']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
